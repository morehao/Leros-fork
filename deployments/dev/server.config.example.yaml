# Leros Development Configuration - Server
env: local
workspace_root:

server:
  port: 8080
  jwt:
    secret: "dev-leros-jwt-secret"

client_update:
  desktop:
    min_supported_version: "0.1.0"
    latest_version: "0.1.12"
    update_url: "https://xxx/stable"
    force_message: "当前客户端版本过低，请更新后继续使用"

database:
  url: "postgres://leros_dev_user:leros_dev_password@localhost:5433/leros_dev_db?sslmode=disable"
  debug: true

nats:
  url: "nats://localhost:4223/"

log:
  level: debug

llm:
  provider: "openai"
  api_key: "${LLM_API_KEY}"
  model: "qwen3.6-plus"
  base_url: "https://api.yygu.cn/v3/llm.chat/"

gitea:
  endpoint: "<your_gitea_endpoint>"
  admin_token: "<your_admin_token>"
  default_owner: "admin"

storage:
  driver: local
  local_dir: ./leros-storage
  bucket: dev-bucket
  static_api_key: "leros-static-api-key"
  sign_secret: "leros-local-presign"
  base_url: "http://localhost:8080"
translation:
  provider: "deepseek"
  api_key: "${LLM_API_KEY}"
  model: "deepseek-v4-flash"
  base_url: "https://api.yygu.cn/v3/llm.chat/"
