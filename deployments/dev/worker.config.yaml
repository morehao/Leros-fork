# Leros Development Configuration - Worker

worker_id: 1
org_id: 1
workspace_root: 

database:
  url: "postgres://leros_dev_user:leros_dev_password@localhost:5433/leros_dev_db?sslmode=disable"
  debug: true

nats:
  url: "nats://localhost:4223/"


log:
  level: debug

llm:
  provider: "openai"
  api_key: "${LLM_API_KEY}"
  model: "qwen3.6-plus"
  base_url: "https://api.yygu.cn/v3/llm.chat/"

cli:
  default: "leros"
