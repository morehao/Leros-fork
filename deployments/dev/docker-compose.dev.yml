version: '3.8'

services:
  postgresql:
    image: registry.yygu.cn/library/postgres:17.9
    container_name: leros-dev-postgresql
    environment:
      POSTGRES_DB: leros_dev_db
      POSTGRES_USER: leros_dev_user
      POSTGRES_PASSWORD: leros_dev_password
    volumes:
      - dev_postgres_data:/var/lib/postgresql/data
      - ../env/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "leros_dev_user", "-d", "leros_dev_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - leros-dev-network

  nats:
    image: registry.yygu.cn/library/nats:2.12.7
    container_name: leros-dev-nats
    command: ["--jetstream"]
    ports:
      - "4223:4222"
      - "8223:8222"
    volumes:
      - dev_nats_data:/data
    healthcheck:
      test: ["CMD", "/nats-server", "--help"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - leros-dev-network

volumes:
  dev_postgres_data:
  dev_nats_data:

networks:
  leros-dev-network:
    driver: bridge
