name: Desktop Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: mac-arm64
            os: macos-latest
            command: dist:desktop:mac:arm64
          - name: mac-x64
            os: macos-latest
            command: dist:desktop:mac:x64
          - name: win-x64
            os: windows-latest
            command: dist:desktop:win:x64
          - name: linux-x64
            os: ubuntu-latest
            command: dist:desktop:linux:x64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Typecheck desktop app
        working-directory: frontend
        run: pnpm --filter @leros/desktop typecheck

      - name: Build desktop package
        working-directory: frontend
        run: pnpm run ${{ matrix.command }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.name }}
          if-no-files-found: error
          path: |
            frontend/apps/desktop/dist/*.dmg
            frontend/apps/desktop/dist/*.zip
            frontend/apps/desktop/dist/*.exe
            frontend/apps/desktop/dist/*.AppImage
            frontend/apps/desktop/dist/*.deb
            frontend/apps/desktop/dist/*.yml
            frontend/apps/desktop/dist/*.blockmap

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd release-assets
          find . -type f ! -name "SHA256SUMS.txt" -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
