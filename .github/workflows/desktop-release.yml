name: Desktop Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

env:
  VITE_LEROS_API_BASE_URL: ${{ vars.VITE_LEROS_API_BASE_URL || 'https://appleros.insmtx.com/v1' }}

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: mac-arm64
            os: macos-15
            command: dist:desktop:mac:arm64
          - name: mac-x64
            os: macos-15-intel
            command: dist:desktop:mac:x64
          - name: win-x64
            os: windows-latest
            command: dist:desktop:win:x64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Cache Electron downloads
        uses: actions/cache@v4
        with:
          path: |
            ${{ runner.temp }}/electron-cache
            ${{ runner.temp }}/electron-builder-cache
          key: desktop-electron-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: |
            desktop-electron-${{ runner.os }}-${{ runner.arch }}-

      - name: Install frontend dependencies
        working-directory: frontend
        shell: bash
        run: |
          for attempt in 1 2 3; do
            if pnpm install --frozen-lockfile; then
              exit 0
            fi

            status=$?
            if [ "$attempt" -eq 3 ]; then
              exit "$status"
            fi

            echo "pnpm install failed, retrying in $((attempt * 20)) seconds..."
            sleep $((attempt * 20))
          done
        env:
          ELECTRON_CACHE: ${{ runner.temp }}/electron-cache
          electron_config_cache: ${{ runner.temp }}/electron-cache
          ELECTRON_BUILDER_CACHE: ${{ runner.temp }}/electron-builder-cache

      - name: Set desktop version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: frontend/apps/desktop
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          node -e '
            const fs = require("node:fs");
            const version = process.argv[1];
            const packagePath = "package.json";
            const packageJson = JSON.parse(fs.readFileSync(packagePath, "utf8"));
            packageJson.version = version;
            fs.writeFileSync(packagePath, `${JSON.stringify(packageJson, null, 2)}\n`);
          ' "$version"
          echo "Desktop version: $version"

      - name: Typecheck desktop app
        working-directory: frontend
        run: pnpm --filter @leros/desktop typecheck

      - name: Prepare macOS signing credentials
        if: startsWith(matrix.name, 'mac-')
        shell: bash
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          CSC_LINK: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          for variable in APPLE_API_KEY_BASE64 APPLE_API_KEY_ID APPLE_API_ISSUER CSC_LINK CSC_KEY_PASSWORD; do
            if [ -z "${!variable}" ]; then
              echo "::error::Required macOS signing secret is missing: ${variable}"
              exit 1
            fi
          done

          printf '%s' "$APPLE_API_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"
          chmod 600 "$RUNNER_TEMP/AuthKey.p8"

      - name: Build desktop package
        working-directory: frontend
        shell: bash
        run: |
          for attempt in 1 2 3; do
            if pnpm run "${{ matrix.command }}"; then
              exit 0
            fi

            status=$?
            if [ "$attempt" -eq 3 ]; then
              exit "$status"
            fi

            echo "Desktop package build failed, retrying in $((attempt * 30)) seconds..."
            sleep $((attempt * 30))
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON_CACHE: ${{ runner.temp }}/electron-cache
          electron_config_cache: ${{ runner.temp }}/electron-cache
          ELECTRON_BUILDER_CACHE: ${{ runner.temp }}/electron-builder-cache
          CSC_LINK: ${{ startsWith(matrix.name, 'mac-') && secrets.MACOS_CERTIFICATE_P12_BASE64 || '' }}
          CSC_KEY_PASSWORD: ${{ startsWith(matrix.name, 'mac-') && secrets.MACOS_CERTIFICATE_PASSWORD || '' }}
          APPLE_API_KEY: ${{ startsWith(matrix.name, 'mac-') && format('{0}/AuthKey.p8', runner.temp) || '' }}
          APPLE_API_KEY_ID: ${{ startsWith(matrix.name, 'mac-') && secrets.APPLE_API_KEY_ID || '' }}
          APPLE_API_ISSUER: ${{ startsWith(matrix.name, 'mac-') && secrets.APPLE_API_ISSUER || '' }}

      - name: Verify macOS signature and notarization
        if: startsWith(matrix.name, 'mac-')
        working-directory: frontend/apps/desktop
        shell: bash
        run: |
          dmg_path="$(find dist -maxdepth 1 -name '*.dmg' -print -quit)"
          if [ -z "$dmg_path" ]; then
            echo "::error::No DMG package found"
            exit 1
          fi

          mount_dir="$(mktemp -d)"
          cleanup() {
            hdiutil detach "$mount_dir" -quiet || true
            rmdir "$mount_dir" || true
          }
          trap cleanup EXIT

          hdiutil attach "$dmg_path" -nobrowse -readonly -mountpoint "$mount_dir"
          app_path="$(find "$mount_dir" -maxdepth 1 -name '*.app' -print -quit)"
          if [ -z "$app_path" ]; then
            echo "::error::No application bundle found in DMG"
            exit 1
          fi

          codesign --verify --deep --strict --verbose=2 "$app_path"
          spctl --assess --type execute --verbose=2 "$app_path"
          xcrun stapler validate "$app_path"

      - name: Collect release payload
        shell: bash
        run: |
          release_dir="${RUNNER_TEMP}/desktop-release/${{ matrix.name }}"
          mkdir -p "$release_dir"

          case "${{ matrix.name }}" in
            mac-*)
              cp frontend/apps/desktop/dist/*.dmg "$release_dir"/
              cp frontend/apps/desktop/dist/*.zip "$release_dir"/
              cp frontend/apps/desktop/dist/*.blockmap "$release_dir"/
              cp frontend/apps/desktop/dist/latest-mac.yml "$release_dir"/
              ;;
            win-*)
              cp frontend/apps/desktop/dist/*.exe "$release_dir"/
              cp frontend/apps/desktop/dist/*.blockmap "$release_dir"/
              cp frontend/apps/desktop/dist/latest.yml "$release_dir"/
              ;;
            *)
              echo "::error::Unsupported build matrix target: ${{ matrix.name }}"
              exit 1
              ;;
          esac

      - name: Upload release payload artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-update-files-${{ matrix.name }}
          if-no-files-found: error
          path: ${{ runner.temp }}/desktop-release/${{ matrix.name }}/*

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download release payload artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-update-files-*
          path: release-assets
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd release-assets
          find . -type f ! -name "SHA256SUMS.txt" -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
