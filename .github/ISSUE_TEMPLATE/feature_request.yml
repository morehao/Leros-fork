name: 功能建议
description: 提出新能力、产品改进或体验优化建议。
title: "[Feature]: "
labels:
  - "type: feature"
  - "status: needs-triage"
body:
  - type: markdown
    attributes:
      value: |
        请聚焦问题、场景和可验收的结果。方案细节可以讨论，但目标需要清晰。
  - type: textarea
    id: problem
    attributes:
      label: 背景与问题
      description: 当前遇到什么限制、成本或痛点？
      placeholder: 例如：AI 队友执行任务后，缺少统一的产物归档入口。
    validations:
      required: true
  - type: textarea
    id: users
    attributes:
      label: 目标用户或使用场景
      description: 谁会使用这个能力？在什么流程中使用？
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 描述你期望新增或改进的能力。
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: 验收标准
      description: 用可验证的条目描述完成后的行为。
      placeholder: |
        - 用户可以 ...
        - 系统会 ...
        - 当 ... 时，应该 ...
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: 相关范围
      description: 选择最接近的模块。维护者 triage 时会同步添加 area 标签。
      options:
        - backend
        - frontend
        - docs
        - infra
        - unsure
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 是否已经尝试过其他实现方式或绕过方案？
  - type: textarea
    id: context
    attributes:
      label: 其他上下文
      description: 可补充截图、草图、竞品参考、相关文档或技术约束。
  - type: checkboxes
    id: checklist
    attributes:
      label: 提交前检查
      options:
        - label: 我已搜索现有 Issues，确认没有重复建议。
          required: true
        - label: 我已尽量说明问题背景，而不仅是实现方案。
          required: true
